name: Publish to npm

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify npm package scope
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          if [ "${PACKAGE_NAME}" != "@calypsohq/multimodal-rag-mcp-server" ]; then
            echo "Unexpected package name: ${PACKAGE_NAME}"
            echo "Expected @calypsohq/multimodal-rag-mcp-server"
            exit 1
          fi

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Smoke stdio transport
        run: npm run smoke:stdio

      - name: Validate MCPB manifest
        run: npm run validate:mcpb

      - name: Check npm version
        id: npm-version
        run: |
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping npm publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm-version.outputs.published == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
