startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - calypsoApiKey
    properties:
      calypsoApiKey:
        type: string
        title: Calypso API Key
        description: API key used to access the Calypso OpenAI-compatible Responses API.
        examples:
          - sk-...
      calypsoApiBaseUrl:
        type: string
        title: Calypso API Base URL
        description: Optional override for self-hosted Calypso-compatible deployments. Defaults to the Calypso cloud API and must end in /v1.
        default: https://api.calypso.so/v1
        examples:
          - https://api.calypso.so/v1
          - https://your-aicore-host.example.com/v1
  commandFunction: |
    (config) => ({
      command: 'npx',
      args: [
        '-y',
        'calypso-mcp',
        '--api-key',
        config.calypsoApiKey,
        ...(config.calypsoApiBaseUrl ? ['--api-base-url', config.calypsoApiBaseUrl] : [])
      ]
    }) 